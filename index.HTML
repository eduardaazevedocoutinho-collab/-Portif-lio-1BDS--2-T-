<!DOCTYPE html> <!-- indica a linguagem  de programação a ser utilizada, nesse caso, o HTML. deve ser a primeira linha do projeto.-->
<html lang="pt-br"> <!--abertura do documento, todas as tags\códigos devem ser escritas nesse espaço-->
<head><!--abertura de tag que define o cabeçalho do documento. O conteúdo inserido nesse espaço não é visível no navegador, mas contém instruções sobre seu conteúdo e comportamento. Dentro dessa tag, podem ser inseridas folhas de estilo e script.-->
    <meta charset="UTF-8"> <!-- esspecifica qual o conjunto de caracteres (character set ou charset) será usado para redenrizar o texto da página. O UTF-8 contém todos os caracteres dos padrões Unicode e ASCII, o mais utilizado em páginas da web. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.
    0"> <!-- fornecem os metadados sobre a pàgina para p navegador,-->
    <title>Portifólio</title> <!-- título da página/documento;-->
</head> <!-- fechamento da tag do cabeçalho-->
<body> <!-- abertura da tag, marcando o espaço no qual deve estar contido o contéúdo visual da página. As demais tag que representam texto, botões e outros,devem ser adicionados nesse intervalo.--> <!--um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra, como no caso da tag meta. Outro aspecto importante da linguagem é que ela é cas insensitive, ou seja, não leva em consideração a diferença entre letras oficiais e minúsculas, sendo assim, as tags podem ser escritas das duas maneiras.-->
<!--No HTML há seis níveis de cabeçalhos\títulos que podem ser usados por meio das tags h1, h2, h3, h4, h5 e h6, sendo o h1 o mais relevante e o h6 o menor\menos relevante.-->
<h1>Matemática</h1>
<h2>Grandezas</h2>
<h3>Unidades de Medidas</h3>
<h4>Comprimento</h4>
<h5>Múltiplos</h5>
<h6>Submúltiplos</h6>
<h1>Teste</h1>

<p>Cria parágrafos para a nossa página.</p>
</body>
</html> <!--fechamento do documento-->
